name: Build index

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "schema/**"
      - "scripts/build-index.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index-main
  cancel-in-progress: false

jobs:
  rebuild:
    name: Rebuild and commit index.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate before building
        run: node scripts/validate.mjs

      - name: Rebuild index.json
        run: node scripts/build-index.mjs

      - name: Commit index.json if changed
        run: |
          git config user.name "moses-catalog-bot"
          git config user.email "noreply@moses-platform.org"
          if git diff --quiet -- index.json; then
            echo "index.json unchanged; nothing to commit."
            exit 0
          fi
          git add index.json
          git commit -m "chore(index): rebuild index.json [skip ci]"
          git push
