# =============================================================================
# moses-app-catalog manifest template (git-native)
#
# Copy this whole directory to apps/<category>/<subcategory>/<your-slug>/:
#   cp -R apps/_template apps/developer-tools/cli-tools/your-app-slug
#
# Then edit every TODO. Comments stay; keep them — reviewers and your future
# self will both thank you. CI rejects this file unchanged.
#
# Schema reference:  ../../../../schema/manifest.schema.json (relative to a
# real listing). Field-by-field design notes are in CONTRIBUTING.md.
# Categories: see ../../../../categories.yaml for the canonical allow-list.
# =============================================================================

# Manifest schema version. Bump only when this repo's schema does.
schemaVersion: 1

# Globally unique slug. MUST equal the directory name under apps/<cat>/<sub>/.
# Lowercase, must start with a letter, alphanumerics + - + _, max 100 chars.
toolKey: your-app-slug

# Human-readable name shown in the Marketplace UI.
displayName: Your App Display Name

# Short description (max 1000 chars). Lead with what the app *does*, not who
# built it. Avoid marketing copy.
description: |
  One to three sentences describing what this app does and the single problem
  it solves.

# Shape of the deployed app:
#   frontend  - static files served via nginx / SPA
#   api       - HTTP API service, headless
#   hybrid    - SPA front-end calling its own back-end
appType: hybrid

# --- Categorization ---------------------------------------------------------
# Pick one category + one subcategory from categories.yaml at the repo root.
# CI rejects values not present there.

category: developer-tools
subcategory: cli-tools

# --- Source repository ------------------------------------------------------
# Moses clones repositoryUrl at the version's `tag`, then builds from source.

repositoryType: github
repositoryUrl: https://github.com/your-org/your-app

# --- Visual assets (optional) -----------------------------------------------
# Pin iconUrl to a specific commit so the icon doesn't drift mid-version.
# Leave commented out if you have nothing to show yet.
# iconUrl: https://raw.githubusercontent.com/your-org/your-app/<commit-sha>/icon.svg

# --- Maintainers ------------------------------------------------------------
# At least one with role: owner. Each entry needs at least one of: github,
# gitlab, email.

maintainers:
  - github: owner-handle
    email: owner@example.com
    role: owner
  # - github: contributor-handle
  #   role: contributor

# --- Policy -----------------------------------------------------------------

policy:
  # SPDX identifier (https://spdx.org/licenses/). The validator also looks for
  # a LICENSE / COPYING file at the root of your source repo.
  license: MIT
